<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 월드컵 예측기</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0a0a1a;
            color: #fff;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #1a1a3e, #2d2d6b);
            padding: 25px 20px;
            text-align: center;
            border-bottom: 2px solid #4a4aff;
        }

        .header h1 { font-size: 2em; }
        .header p  { color: #aaa; margin-top: 5px; }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 25px;
            border-bottom: 2px solid #333;
            flex-wrap: wrap;
        }

        .tab {
            padding: 10px 18px;
            background: none;
            border: none;
            color: #aaa;
            cursor: pointer;
            font-size: 0.95em;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
            margin-bottom: -2px;
        }

        .tab.active { color: #4a4aff; border-bottom-color: #4a4aff; }
        .tab:hover  { color: #fff; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* 공통 카드 */
        .card {
            background: #1a1a2e;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
        }

        .card h2 { margin-bottom: 20px; font-size: 1.3em; }

        /* 경기 예측 */
        .team-select {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .team-select select {
            flex: 1;
            padding: 12px;
            background: #2d2d4e;
            border: 1px solid #4a4aff;
            border-radius: 8px;
            color: #fff;
            font-size: 1em;
        }

        .vs-text {
            font-size: 1.5em;
            font-weight: bold;
            color: #4a4aff;
            min-width: 40px;
            text-align: center;
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #4a4aff, #7a4aff);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 1.05em;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        .btn-primary:hover { opacity: 0.85; }

        .result-box {
            display: none;
            background: #0d0d2e;
            border-radius: 15px;
            padding: 25px;
            margin-top: 20px;
            border: 1px solid #4a4aff;
        }

        .match-title {
            text-align: center;
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 20px;
            color: #fff;
        }

        .prob-bars { margin: 15px 0; }

        .prob-row {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            gap: 10px;
        }

        .prob-label {
            width: 110px;
            font-size: 0.9em;
            color: #ccc;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .prob-bar-bg {
            flex: 1;
            background: #2a2a4e;
            border-radius: 6px;
            height: 28px;
            overflow: hidden;
        }

        .prob-bar {
            height: 100%;
            border-radius: 6px;
            display: flex;
            align-items: center;
            padding-left: 10px;
            font-size: 0.9em;
            font-weight: bold;
            transition: width 0.8s ease;
            min-width: 40px;
        }

        .bar-home { background: linear-gradient(90deg, #4a4aff, #7a7aff); }
        .bar-draw { background: linear-gradient(90deg, #ff9900, #ffcc44); }
        .bar-away { background: linear-gradient(90deg, #ff4444, #ff8888); }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        .info-card {
            background: #1a1a3e;
            border-radius: 10px;
            padding: 12px;
            text-align: center;
        }

        .info-card .label { color: #aaa; font-size: 0.75em; margin-bottom: 6px; }
        .info-card .value { font-size: 1.1em; font-weight: bold; color: #4a4aff; }

        /* 조별리그 */
        .group-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
        }

        .group-btn {
            padding: 8px 16px;
            background: #1a1a2e;
            border: 1px solid #4a4aff;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9em;
        }

        .group-btn:hover, .group-btn.active { background: #4a4aff; }

        .group-result {
            background: #1a1a2e;
            border-radius: 15px;
            padding: 20px;
        }

        /* 테이블 공통 */
        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table th {
            background: #2d2d4e;
            padding: 12px 10px;
            text-align: left;
            color: #aaa;
            font-size: 0.85em;
            font-weight: normal;
        }

        .data-table td {
            padding: 12px 10px;
            border-bottom: 1px solid #222;
            font-size: 0.95em;
        }

        .data-table tr:hover { background: #1a1a3e; }

        /* 진출 확률 바 */
        .qualify-bar {
            height: 6px;
            background: #333;
            border-radius: 3px;
            overflow: hidden;
            margin-top: 4px;
            width: 100%;
        }

        .qualify-fill {
            height: 100%;
            background: linear-gradient(90deg, #4a4aff, #00ff88);
            border-radius: 3px;
            transition: width 0.5s ease;
        }

        /* 확률 색상 */
        .prob-high { color: #00ff88; font-weight: bold; }
        .prob-mid  { color: #ffbb44; font-weight: bold; }
        .prob-low  { color: #ff7777; font-weight: bold; }

        /* 로딩 */
        .loading {
            text-align: center;
            padding: 50px;
            color: #aaa;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #333;
            border-top-color: #4a4aff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* 순위 번호 */
        .rank-num { font-weight: bold; color: #4a4aff; }

        /* 우승 예측 특별 스타일 */
        .champion-badge {
            display: inline-block;
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: #000;
            border-radius: 4px;
            padding: 2px 8px;
            font-size: 0.8em;
            font-weight: bold;
        }

        /* 반응형 */
        @media (max-width: 600px) {
            .team-select { flex-direction: column; }
            .info-grid { grid-template-columns: repeat(2, 1fr); }
            .header h1 { font-size: 1.5em; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>⚽ 2026 FIFA 월드컵 예측기</h1>
    <p>XGBoost + 역대 데이터 + H2H + FIFA랭킹 기반 AI 예측</p>
</div>

<div class="container">

    <!-- 탭 메뉴 -->
    <div class="tabs">
        <button class="tab active" onclick="showTab('predict', this)">⚽ 경기 예측</button>
        <button class="tab" onclick="showTab('group', this)">📊 조별리그 시뮬레이션</button>
        <button class="tab" onclick="showTab('ranking', this)">📈 32강 진출 확률</button>
        <button class="tab" onclick="showTab('tournament', this)">🏆 우승팀 예측</button>
    </div>

    <!-- ① 경기 예측 탭 -->
    <div id="tab-predict" class="tab-content active">
        <div class="card">
            <h2>⚽ 경기 예측</h2>
            <div class="team-select">
                <select id="home-team">
                    <option value="">홈팀 선택</option>
                    {% for group, teams in groups.items() %}
                    <optgroup label="{{ group }}조">
                        {% for team in teams %}
                        <option value="{{ team }}">{{ team }}</option>
                        {% endfor %}
                    </optgroup>
                    {% endfor %}
                </select>
                <span class="vs-text">VS</span>
                <select id="away-team">
                    <option value="">원정팀 선택</option>
                    {% for group, teams in groups.items() %}
                    <optgroup label="{{ group }}조">
                        {% for team in teams %}
                        <option value="{{ team }}">{{ team }}</option>
                        {% endfor %}
                    </optgroup>
                    {% endfor %}
                </select>
            </div>
            <button class="btn-primary" onclick="predictMatch()">🔮 예측하기</button>
        </div>

        <div class="result-box" id="result-box">
            <div class="match-title" id="match-title"></div>
            <div class="prob-bars">
                <div class="prob-row">
                    <span class="prob-label" id="home-label">홈팀</span>
                    <div class="prob-bar-bg">
                        <div class="prob-bar bar-home" id="bar-home" style="width:0%"></div>
                    </div>
                </div>
                <div class="prob-row">
                    <span class="prob-label">무승부</span>
                    <div class="prob-bar-bg">
                        <div class="prob-bar bar-draw" id="bar-draw" style="width:0%"></div>
                    </div>
                </div>
                <div class="prob-row">
                    <span class="prob-label" id="away-label">원정팀</span>
                    <div class="prob-bar-bg">
                        <div class="prob-bar bar-away" id="bar-away" style="width:0%"></div>
                    </div>
                </div>
            </div>
            <div class="info-grid">
                <div class="info-card">
                    <div class="label">홈팀 FIFA 랭킹</div>
                    <div class="value" id="home-rank">-</div>
                </div>
                <div class="info-card">
                    <div class="label">원정팀 FIFA 랭킹</div>
                    <div class="value" id="away-rank">-</div>
                </div>
                <div class="info-card">
                    <div class="label">H2H 홈팀 승률</div>
                    <div class="value" id="h2h-home">-</div>
                </div>
                <div class="info-card">
                    <div class="label">H2H 원정팀 승률</div>
                    <div class="value" id="h2h-away">-</div>
                </div>
            </div>
        </div>
    </div>

    <!-- ② 조별리그 시뮬레이션 탭 -->
    <div id="tab-group" class="tab-content">
        <h2 style="margin-bottom: 15px;">📊 조별리그 시뮬레이션</h2>
        <div class="group-selector">
            {% for group in groups.keys() %}
            <button class="group-btn" onclick="simulateGroup('{{ group }}', this)">
                {{ group }}조
            </button>
            {% endfor %}
        </div>
        <div class="group-result" id="group-result">
            <p style="color: #aaa; text-align: center; padding: 30px;">
                조를 선택하면 시뮬레이션 결과가 나와요 😊
            </p>
        </div>
    </div>

    <!-- ③ 32강 진출 확률 탭 -->
    <div id="tab-ranking" class="tab-content">
        <h2 style="margin-bottom: 15px;">📈 전체 32강 진출 확률</h2>
        <button class="btn-primary" onclick="simulateAll()" style="margin-bottom: 20px;">
            🔄 전체 시뮬레이션 실행 (약 30초)
        </button>
        <div id="ranking-result">
            <p style="color: #aaa; text-align: center; padding: 30px;">
                버튼을 눌러 전체 시뮬레이션을 실행하세요
            </p>
        </div>
    </div>

    <!-- ④ 우승팀 예측 탭 -->
    <div id="tab-tournament" class="tab-content">
        <h2 style="margin-bottom: 15px;">🏆 우승팀 예측</h2>
        <button class="btn-primary" onclick="simulateTournament()" style="margin-bottom: 20px;">
            🔄 전체 대회 시뮬레이션 (약 1분)
        </button>
        <div id="tournament-result">
            <p style="color: #aaa; text-align: center; padding: 30px;">
                버튼을 눌러 전체 대회를 시뮬레이션하세요
            </p>
        </div>
    </div>

</div>

<script>
// 탭 전환
function showTab(name, btn) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    if (btn) btn.classList.add('active');
}

// 확률 색상
function probClass(val) {
    return val >= 70 ? 'prob-high' : val >= 40 ? 'prob-mid' : 'prob-low';
}

// ① 경기 예측
async function predictMatch() {
    const home = document.getElementById('home-team').value;
    const away = document.getElementById('away-team').value;

    if (!home || !away) { alert('팀을 선택해주세요!'); return; }
    if (home === away)  { alert('서로 다른 팀을 선택해주세요!'); return; }

    const res  = await fetch('/api/predict', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({home, away})
    });
    const data = await res.json();

    document.getElementById('match-title').textContent = `${data.home} vs ${data.away}`;
    document.getElementById('home-label').textContent  = data.home;
    document.getElementById('away-label').textContent  = data.away;

    setTimeout(() => {
        document.getElementById('bar-home').style.width = data.home_win + '%';
        document.getElementById('bar-home').textContent = data.home_win + '%';
        document.getElementById('bar-draw').style.width = data.draw + '%';
        document.getElementById('bar-draw').textContent = data.draw + '%';
        document.getElementById('bar-away').style.width = data.away_win + '%';
        document.getElementById('bar-away').textContent = data.away_win + '%';
    }, 100);

    document.getElementById('home-rank').textContent = data.home_rank + '위';
    document.getElementById('away-rank').textContent = data.away_rank + '위';
    document.getElementById('h2h-home').textContent  = data.h2h_home + '%';
    document.getElementById('h2h-away').textContent  = data.h2h_away + '%';
    document.getElementById('result-box').style.display = 'block';
}

// ② 조별리그 시뮬레이션
async function simulateGroup(group, btn) {
    document.querySelectorAll('.group-btn').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');

    document.getElementById('group-result').innerHTML = `
        <div class="loading">
            <div class="spinner"></div>
            <p>${group}조 시뮬레이션 중...</p>
        </div>`;

    const res  = await fetch('/api/simulate_group', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({group})
    });
    const data = await res.json();

    let html = `
        <h3 style="margin-bottom: 15px;">${group}조 시뮬레이션 결과</h3>
        <table class="data-table">
            <thead>
                <tr>
                    <th>팀</th>
                    <th>FIFA 랭킹</th>
                    <th>1위</th>
                    <th>2위</th>
                    <th>3위</th>
                    <th>4위</th>
                    <th>평균 승점</th>
                    <th>32강 진출</th>
                </tr>
            </thead>
            <tbody>`;

    data.result.forEach(team => {
        html += `
            <tr>
                <td><strong>${team.team}</strong></td>
                <td style="color:#aaa">${team.rank}위</td>
                <td>${team.first}%</td>
                <td>${team.second}%</td>
                <td>${team.third}%</td>
                <td>${team.fourth}%</td>
                <td>${team.avg_points}점</td>
                <td>
                    <span class="${probClass(team.qualify)}">${team.qualify}%</span>
                    <div class="qualify-bar">
                        <div class="qualify-fill" style="width:${team.qualify}%"></div>
                    </div>
                </td>
            </tr>`;
    });

    html += '</tbody></table>';
    document.getElementById('group-result').innerHTML = html;
}

// ③ 전체 32강 확률
async function simulateAll() {
    document.getElementById('ranking-result').innerHTML = `
        <div class="loading">
            <div class="spinner"></div>
            <p>전체 시뮬레이션 중... (약 30초)</p>
        </div>`;

    const res  = await fetch('/api/simulate_all');
    const data = await res.json();

    let allTeams = [];
    Object.values(data).forEach(group => {
        group.forEach(team => allTeams.push(team));
    });
    allTeams.sort((a, b) => b.qualify - a.qualify);

    let html = `
        <table class="data-table">
            <thead>
                <tr>
                    <th>#</th>
                    <th>팀</th>
                    <th>FIFA 랭킹</th>
                    <th>32강 진출 확률</th>
                </tr>
            </thead>
            <tbody>`;

    allTeams.forEach((team, idx) => {
        html += `
            <tr>
                <td class="rank-num">${idx + 1}</td>
                <td>${team.team}</td>
                <td style="color:#aaa">${team.rank}위</td>
                <td>
                    <span class="${probClass(team.qualify)}">${team.qualify}%</span>
                    <div class="qualify-bar">
                        <div class="qualify-fill" style="width:${team.qualify}%"></div>
                    </div>
                </td>
            </tr>`;
    });

    html += '</tbody></table>';
    document.getElementById('ranking-result').innerHTML = html;
}

// ④ 우승팀 예측
async function simulateTournament() {
    document.getElementById('tournament-result').innerHTML = `
        <div class="loading">
            <div class="spinner"></div>
            <p>전체 대회 시뮬레이션 중... (약 1분)</p>
        </div>`;

    const res  = await fetch('/api/tournament');
    const data = await res.json();

    let html = `
        <table class="data-table">
            <thead>
                <tr>
                    <th>#</th>
                    <th>팀</th>
                    <th>FIFA 랭킹</th>
                    <th>🏆 우승</th>
                    <th>결승</th>
                    <th>4강</th>
                    <th>8강</th>
                </tr>
            </thead>
            <tbody>`;

    data.forEach((team, idx) => {
        const champClass = team.champion >= 10 ? 'prob-high' :
                           team.champion >= 3  ? 'prob-mid'  : 'prob-low';
        const medal = idx === 0 ? '🥇' : idx === 1 ? '🥈' : idx === 2 ? '🥉' : '';
        html += `
            <tr>
                <td class="rank-num">${medal || (idx + 1)}</td>
                <td><strong>${team.team}</strong></td>
                <td style="color:#aaa">${team.rank}위</td>
                <td>
                    <span class="${champClass}">${team.champion}%</span>
                    <div class="qualify-bar">
                        <div class="qualify-fill" style="width:${Math.min(team.champion * 3, 100)}%"></div>
                    </div>
                </td>
                <td>${team.final}%</td>
                <td>${team.semi}%</td>
                <td>${team.quarter}%</td>
            </tr>`;
    });

    html += '</tbody></table>';
    document.getElementById('tournament-result').innerHTML = html;
}
</script>
</body>
</html>
